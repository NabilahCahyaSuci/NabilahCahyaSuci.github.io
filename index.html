<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Project</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Quicksand', sans-serif;
}

body{
  background: linear-gradient(135deg,#ffd6ec,#ffb3da);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  background:#fff0f7;
  width:90%;
  max-width:360px;
  border-radius:35px;
  padding:30px;
  text-align:center;
  box-shadow:0 15px 35px rgba(255,105,180,0.2);
}

.card img{
  width:110px;
  border-radius:25px;
  margin-bottom:15px;
}

.card h2{
  color:#d63384;
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  color:#6c4675;
  margin-bottom:20px;
}

/* BUTTON */
button{
  background: linear-gradient(45deg,#ff69b4,#ff85c2);
  border:none;
  padding:10px 22px;
  border-radius:25px;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s ease;
}

button:hover{
  transform:scale(1.07);
  box-shadow:0 8px 20px rgba(255,105,180,0.4);
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(255,182,193,0.6);
  backdrop-filter:blur(5px);
  justify-content:center;
  align-items:center;
  padding:20px;
}

.modal-content{
  background:white;
  width:100%;
  max-width:800px;
  border-radius:30px;
  overflow:hidden;
  position:relative;
  animation:fade 0.4s ease;
}

.close{
  position:absolute;
  right:18px;
  top:12px;
  font-size:22px;
  color:#ff4fa3;
  cursor:pointer;
  font-weight:bold;
}

.modal iframe{
  width:100%;
  height:500px;
  border:none;
}

@keyframes fade{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">
  <img src="Cuplikan layar 2026-02-26 080155.png" alt="Project">
  <h2>Pink Flutter Project</h2>
  <p>
    Halaman ini menampilkan hasil output dari program Fibonaci yang di buat menggunakan bahasa Dart.
    Klik tombol di bawah untuk melihat source code.
  </p>
  <button onclick="openModal()">Lihat Source Code</button>
</div>

<div class="modal" id="popup">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <iframe src="https://dartpad.dev/embed-dart.html?id=929eb97413537d2a787928ae6f4ca447"></iframe>
  </div>
</div>

<script>
function openModal(){
  document.getElementById("popup").style.display="flex";
}

function closeModal(){
  document.getElementById("popup").style.display="none";
}

window.onclick=function(e){
  const modal=document.getElementById("popup");
  if(e.target===modal){
    modal.style.display="none";
  }
}
</script>

</body>
</html>
